<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>The Speak Up Book Club Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Quicksand&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #c8a2c8; /* lilás */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            font-family: 'Quicksand', sans-serif;
        }

        .container {
            background: #fff9f1;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
        }

        button {
            background-color: #8a2be2;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #6a1bbf;
        }
    </style>
</head>

<body>
    <div class="container">
        
        <h1 style="color: #564592; font-weight: bold;">
            📖💜WE'RE THE SPEAK UP📖💜
        </h1>
        
        <img src="tsu.jpg" alt="Logo Speak Up" width="300">

        <p>CONFIRA O NOSSO PORTFOLIO</p>

        <button onclick="irParaSite()">PORTFOLIO</button>
    </div>

    <script>
        function irParaSite() {
            window.location.href = "https://drive.google.com/file/d/1kAjUXbI0aEFB3pdoe4Ougcxbu5sfuDfd/view?usp=sharing";
        }
    </script>
</body>
</html>
